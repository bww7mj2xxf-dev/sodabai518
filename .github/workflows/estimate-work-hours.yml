name: Estimate Work Hours

on:
  schedule:
    # 每周一 10:00 北京时间 = 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  estimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Estimate & Write Work Hours
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python3 weekly-reports/estimate_work_hours.py --auto
