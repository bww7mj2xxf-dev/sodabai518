name: Daily Report Reminder

on:
  schedule:
    # UTC 1:00 = 北京时间 9:00，周一至周五
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r weekly-reports/daily-reminder/requirements.txt

      - name: Run reminder
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python weekly-reports/daily-reminder/main.py
